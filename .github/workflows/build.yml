name: Build Hailo Sysext

on:
  workflow_dispatch:
    inputs:
      truenas_version:
        description: 'TrueNAS version (leave blank for latest tracked)'
        required: false
        default: ''
      hailo_driver_version:
        description: 'HailoRT driver version (leave blank for latest tracked)'
        required: false
        default: ''
      train_name:
        description: 'Train name (leave blank for latest tracked)'
        required: false
        default: ''
      runner:
        description: 'GitHub Actions runner (leave blank to auto-resolve from TrueNAS release)'
        required: false
        default: ''
      mark_latest:
        description: 'true = publish straight to Latest; false (default) = prerelease + hardware-test gate'
        required: false
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'false'

  workflow_call:
    inputs:
      truenas_version:
        type: string
        required: true
      hailo_driver_version:
        type: string
        required: true
      train_name:
        type: string
        required: true
      runner:
        type: string
        required: false
        default: ''
      mark_latest:
        type: string
        required: false
        default: 'false'

permissions:
  contents: write
  issues: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      truenas_version: ${{ steps.params.outputs.truenas_version }}
      hailo_driver_version: ${{ steps.params.outputs.hailo_driver_version }}
      train_name: ${{ steps.params.outputs.train_name }}
      runner: ${{ steps.params.outputs.runner }}
      mark_latest: ${{ steps.params.outputs.mark_latest }}
      prerelease: ${{ steps.params.outputs.prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/tracked-versions.json
            .github/scripts/resolve-runner.sh
          sparse-checkout-cone-mode: false

      - name: Resolve build parameters
        id: params
        env:
          INPUT_TRUENAS_VERSION: ${{ inputs.truenas_version }}
          INPUT_HAILO_DRIVER_VERSION: ${{ inputs.hailo_driver_version }}
          INPUT_TRAIN_NAME: ${{ inputs.train_name }}
          INPUT_RUNNER: ${{ inputs.runner }}
          INPUT_MARK_LATEST: ${{ inputs.mark_latest }}
        run: |
          set -euo pipefail

          TRACKED=$(python3 -c "
          import json
          with open('.github/tracked-versions.json') as f:
              d = json.load(f)
          print(d['truenas']['version'])
          print(d['truenas']['train'])
          print(d['hailo']['driver'])
          ")
          TRACKED_VERSION=$(sed -n '1p' <<< "$TRACKED")
          TRACKED_TRAIN=$(sed -n '2p' <<< "$TRACKED")
          TRACKED_HAILO=$(sed -n '3p' <<< "$TRACKED")

          VERSION="${INPUT_TRUENAS_VERSION:-$TRACKED_VERSION}"
          TRAIN="${INPUT_TRAIN_NAME:-$TRACKED_TRAIN}"
          HAILO="${INPUT_HAILO_DRIVER_VERSION:-$TRACKED_HAILO}"
          RUNNER="${INPUT_RUNNER}"
          MARK_LATEST="${INPUT_MARK_LATEST:-true}"
          # Unverified auto-builds (mark_latest=false) are published as a
          # PRERELEASE so GitHub keeps them out of /releases/latest (and thus
          # install.sh) until a human promotes them. make_latest=false alone
          # does NOT hold this gate with action-gh-release@v3.
          if [ "$MARK_LATEST" = "true" ]; then PRERELEASE="false"; else PRERELEASE="true"; fi

          if [ -z "$VERSION" ]; then VERSION="$TRACKED_VERSION"; fi
          if [ -z "$TRAIN" ];   then TRAIN="$TRACKED_TRAIN";     fi
          if [ -z "$HAILO" ];   then HAILO="$TRACKED_HAILO";     fi

          if [ -z "$RUNNER" ]; then
            RUNNER=$(.github/scripts/resolve-runner.sh "$TRAIN" "$VERSION")
          fi

          {
            echo "truenas_version=${VERSION}"
            echo "hailo_driver_version=${HAILO}"
            echo "train_name=${TRAIN}"
            echo "runner=${RUNNER}"
            echo "mark_latest=${MARK_LATEST}"
            echo "prerelease=${PRERELEASE}"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved build parameters:"
          echo "  truenas_version=${VERSION}"
          echo "  hailo_driver_version=${HAILO}"
          echo "  train_name=${TRAIN}"
          echo "  runner=${RUNNER}"
          echo "  mark_latest=${MARK_LATEST}"
          echo "  prerelease=${PRERELEASE}"

  build:
    needs: resolve
    runs-on: ${{ needs.resolve.outputs.runner }}
    timeout-minutes: 90
    outputs:
      run_number: ${{ steps.build_id.outputs.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-12 \
            cmake \
            libelf-dev \
            squashfs-tools \
            zstd \
            kmod \
            curl

      - name: Compute build identifier
        id: build_id
        # Burned into the release tag as -r<run> so every invocation gets a
        # unique tag and nothing collides with GitHub's immutable-release
        # tag-burn (see issue #17). github.run_number is monotonic per
        # workflow, so it also covers the same-commit re-dispatch case
        # (manual retry after a transient failure, fresh build after a
        # deleted release) where a SHA alone wouldn't change. Short and
        # human-readable; run_id would also work but is an opaque 11-digit ID.
        # Exposed as a step output (not $GITHUB_ENV) so workflow expressions
        # can reference it statically; run blocks that need the value as a
        # shell var get it through the step's env: block.
        run: |
          echo "run_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      # ── Obtain TrueNAS kernel headers from the release ISO ──
      - name: Restore cached TrueNAS ISO
        id: iso-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/truenas.iso
          key: truenas-iso-${{ needs.resolve.outputs.truenas_version }}

      - name: Download TrueNAS ISO
        if: steps.iso-cache.outputs.cache-hit != 'true'
        run: |
          TRAIN="TrueNAS-SCALE-${{ needs.resolve.outputs.train_name }}"
          VERSION="${{ needs.resolve.outputs.truenas_version }}"
          ISO_URL="https://download.truenas.com/${TRAIN}/${VERSION}/TrueNAS-SCALE-${VERSION}.iso"
          echo "Downloading: ${ISO_URL}"
          curl -fSL "$ISO_URL" -o /tmp/truenas.iso
          ls -lh /tmp/truenas.iso

      - name: Save TrueNAS ISO to cache
        if: steps.iso-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/truenas.iso
          key: truenas-iso-${{ needs.resolve.outputs.truenas_version }}

      - name: Restore cached kernel headers
        id: headers-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/kernel-headers
          key: kernel-headers-v3-${{ needs.resolve.outputs.truenas_version }}

      - name: Extract kernel headers from TrueNAS ISO
        if: steps.headers-cache.outputs.cache-hit != 'true'
        run: |
          # TrueNAS ISO structure:
          #   /live/filesystem.squashfs  — installer-only environment (NO kernel headers)
          #   /TrueNAS-SCALE.update      — outer squashfs containing:
          #     /rootfs.squashfs           — full rootfs with headers at /usr/src/linux-headers-*
          #
          # We must extract the nested rootfs.squashfs from inside the .update file.

          sudo mkdir -p /tmp/iso
          sudo mount -o loop /tmp/truenas.iso /tmp/iso

          echo "=== ISO contents ==="
          ls -la /tmp/iso/

          # --- Extract the real rootfs from TrueNAS-SCALE.update (nested squashfs) ---
          # TrueNAS 24/25 name the outer update squashfs "TrueNAS-SCALE.update";
          # TrueNAS 26 (Halfmoon) renamed it to "TrueNAS.update". Accept either
          # known name, then any *.update, before falling back to the installer's
          # (header-less) live/filesystem.squashfs.
          UPDATE_FILE=""
          for cand in /tmp/iso/TrueNAS-SCALE.update /tmp/iso/TrueNAS.update /tmp/iso/*.update; do
            if [ -f "$cand" ]; then UPDATE_FILE="$cand"; break; fi
          done
          if [ -n "$UPDATE_FILE" ]; then
            echo "Found update squashfs: ${UPDATE_FILE} ($(du -h "$UPDATE_FILE" | cut -f1)), extracting rootfs.squashfs..."
            sudo rm -rf /tmp/update-contents
            sudo unsquashfs -d /tmp/update-contents "$UPDATE_FILE" rootfs.squashfs || {
              echo "ERROR: Failed to extract rootfs.squashfs from .update file"
              sudo umount /tmp/iso
              exit 1
            }

            ROOTFS_SQUASHFS="/tmp/update-contents/rootfs.squashfs"
            if [ ! -f "$ROOTFS_SQUASHFS" ]; then
              echo "ERROR: rootfs.squashfs not found inside .update file"
              echo "=== .update contents ==="
              ls -la /tmp/update-contents/
              sudo umount /tmp/iso
              exit 1
            fi

            echo "Extracting kernel headers from rootfs.squashfs..."
            sudo rm -rf /tmp/rootfs
            # Extract only /usr/src and /lib/modules to save time and disk
            sudo unsquashfs -d /tmp/rootfs "$ROOTFS_SQUASHFS" 'usr/src/linux-headers-*' 'lib/modules/*' || {
              echo "WARNING: Selective extract failed, trying full extract..."
              sudo rm -rf /tmp/rootfs
              sudo unsquashfs -d /tmp/rootfs "$ROOTFS_SQUASHFS"
            }
          else
            echo "No TrueNAS-SCALE.update found, falling back to live/filesystem.squashfs..."

            # Fallback for older ISO layouts
            SQUASHFS=""
            for candidate in \
              /tmp/iso/live/filesystem.squashfs \
              /tmp/iso/rootfs.squashfs \
              /tmp/iso/truenas.squashfs; do
              if [ -f "$candidate" ]; then
                SQUASHFS="$candidate"
                break
              fi
            done

            if [ -z "$SQUASHFS" ]; then
              echo "ERROR: Could not find any squashfs in ISO"
              find /tmp/iso -name "*.squashfs" -o -name "*.update" 2>/dev/null || true
              sudo umount /tmp/iso
              exit 1
            fi

            echo "Found squashfs: $SQUASHFS"
            sudo mkdir -p /tmp/rootfs
            sudo mount -o loop "$SQUASHFS" /tmp/rootfs
          fi

          # --- Find kernel headers ---
          echo "=== /usr/src contents ==="
          ls -la /tmp/rootfs/usr/src/ 2>/dev/null || echo "(empty or missing)"

          # Select kernel headers: prefer production over debug
          # TrueNAS provides headers like:
          #   linux-headers-truenas-production-amd64  (non-versioned, preferred)
          #   linux-headers-truenas-debug-amd64       (non-versioned, avoid)
          #   linux-headers-6.6.x-production+truenas  (versioned, preferred)
          #   linux-headers-6.6.x-debug+truenas       (versioned, avoid)
          # We deliberately do NOT fall further back to "any headers
          # including debug" — if both selectors miss, the rootfs layout
          # has changed and we want loud failure rather than building
          # against headers we can't identify.
          # shellcheck disable=SC2010 # ls|grep is fine: TrueNAS rootfs filenames are package-controlled (no spaces/newlines)
          KVER=$(ls /tmp/rootfs/usr/src/ 2>/dev/null | grep 'linux-headers-' | sed 's/linux-headers-//' | grep -i 'production' | head -1)
          if [ -z "$KVER" ]; then
            # Fall back to any non-debug headers
            # shellcheck disable=SC2010
            KVER=$(ls /tmp/rootfs/usr/src/ 2>/dev/null | grep 'linux-headers-' | sed 's/linux-headers-//' | grep -vi 'debug' | head -1)
          fi

          if [ -z "$KVER" ]; then
            echo "::error title=kernel-headers::no production or non-debug headers found under /tmp/rootfs/usr/src/. The TrueNAS rootfs layout may have changed; investigate before relaxing the selector."
            echo "=== Debug: /usr/src contents ==="
            ls -la /tmp/rootfs/usr/src/ 2>/dev/null || true
            echo "=== Debug: /lib/modules contents ==="
            ls -la /tmp/rootfs/lib/modules/ 2>/dev/null || true
            sudo umount /tmp/iso 2>/dev/null || true
            exit 1
          fi

          echo "Header package version: ${KVER}"

          # Detect the REAL kernel version (what uname -r returns on the target).
          # The header directory name (e.g. truenas-production-amd64) may differ
          # from the actual kernel release string (e.g. 6.12.33-production+truenas).
          REAL_KVER=""
          # Method 1: kernel.release in headers (authoritative — this is what
          # the build system records as the kernel release string).
          KREL_FILE="/tmp/rootfs/usr/src/linux-headers-${KVER}/include/config/kernel.release"
          if [ -f "$KREL_FILE" ]; then
            REAL_KVER=$(tr -d '[:space:]' < "$KREL_FILE")
          fi
          # Method 2: /lib/modules directory name (fallback when headers are
          # split across packages and kernel.release isn't co-located).
          # Mirror the production-preferred / non-debug selector used for
          # KVER above: a rootfs that ships both kernels would otherwise
          # let `head -1` pick `*-debug+truenas` (sorts before production)
          # and we'd ship a sysext under the wrong /lib/modules/<kver>/.
          if [ -z "$REAL_KVER" ]; then
            # shellcheck disable=SC2010
            REAL_KVER=$(ls /tmp/rootfs/lib/modules/ 2>/dev/null | grep -v '^\.' | grep -i 'production' | head -1)
          fi
          if [ -z "$REAL_KVER" ]; then
            # shellcheck disable=SC2010
            REAL_KVER=$(ls /tmp/rootfs/lib/modules/ 2>/dev/null | grep -v '^\.' | grep -vi 'debug' | head -1)
          fi
          # No fallback to $KVER: the header *package* name (e.g.
          # truenas-production-amd64) is not a kernel release string, and
          # using it puts modules at the wrong /lib/modules/<kver>/ path.
          # Better to fail the build than ship a sysext that won't load.
          if [ -z "$REAL_KVER" ]; then
            echo "::error title=kernel-version::could not resolve real kernel version. Method 1 (${KREL_FILE}) and Method 2 (/tmp/rootfs/lib/modules/) both returned empty. The TrueNAS rootfs layout may have changed; investigate before bumping the runner or KVER detection." >&2
            exit 1
          fi
          echo "Real kernel version: ${REAL_KVER}"

          # Copy kernel headers to build directory
          sudo mkdir -p /tmp/kernel-headers
          sudo cp -a "/tmp/rootfs/usr/src/linux-headers-${KVER}" /tmp/kernel-headers/

          # Save real kernel version for later steps
          echo "$REAL_KVER" | sudo tee /tmp/kernel-headers/.real-kver

          # Cleanup: /tmp/rootfs is a loop mount on the fallback path but an
          # unsquashfs extraction on the primary path. Try umount first (no-op
          # when it's a plain directory), then rm -rf to cover the extraction
          # case. /tmp/update-contents is only created on the primary path.
          sudo umount /tmp/rootfs 2>/dev/null || true
          sudo rm -rf /tmp/rootfs /tmp/update-contents
          sudo umount /tmp/iso 2>/dev/null || true

          echo "Kernel headers extracted successfully"
          ls -la /tmp/kernel-headers/

      - name: Save kernel headers to cache
        if: steps.headers-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/kernel-headers
          key: kernel-headers-v3-${{ needs.resolve.outputs.truenas_version }}

      - name: Detect kernel version from cached headers
        run: |
          # Same selector pattern as the extract step: prefer production,
          # fall back to non-debug, then fail loud rather than picking up
          # debug headers (whose package name leaks into the module path
          # and would ship a sysext we can't identify).
          # shellcheck disable=SC2010 # ls|grep is fine: TrueNAS package-controlled filenames
          KVER=$(ls /tmp/kernel-headers/ | grep 'linux-headers-' | sed 's/linux-headers-//' | grep -i 'production' | head -1)
          if [ -z "$KVER" ]; then
            # shellcheck disable=SC2010
            KVER=$(ls /tmp/kernel-headers/ | grep 'linux-headers-' | sed 's/linux-headers-//' | grep -vi 'debug' | head -1)
          fi
          if [ -z "$KVER" ]; then
            echo "::error title=kernel-headers::no production or non-debug headers found in cache /tmp/kernel-headers/. Cache may have been populated from a rootfs with a changed layout; bust the kernel-headers cache and re-run."
            ls -la /tmp/kernel-headers/
            exit 1
          fi
          echo "Header package version: ${KVER}"
          echo "KVER=${KVER}" >> "$GITHUB_ENV"

          # Read real kernel version (what uname -r returns on the target).
          # Do NOT fall back to KVER: the header package name (e.g.
          # truenas-production-amd64) is not a kernel release string, and
          # using it puts modules at the wrong /lib/modules/<kver>/ path.
          # A missing .real-kver means the cache is corrupted or pre-dates
          # the v3 key scheme — fail loud so the operator busts the cache.
          REAL_KVER=""
          if [ -f "/tmp/kernel-headers/.real-kver" ]; then
            REAL_KVER=$(tr -d '[:space:]' < /tmp/kernel-headers/.real-kver)
          fi
          if [ -z "$REAL_KVER" ]; then
            echo "::error title=kernel-version::.real-kver missing or empty in cached kernel headers. Bust the kernel-headers cache (key: kernel-headers-v3-${{ needs.resolve.outputs.truenas_version }}) and re-run."
            exit 1
          fi
          echo "Real kernel version: ${REAL_KVER}"
          echo "REAL_KVER=${REAL_KVER}" >> "$GITHUB_ENV"

          # Detect the GCC major version the kernel was compiled with, instead of
          # hardcoding one. Newer TrueNAS kernels move forward: 6.6/6.12 were
          # built with gcc-12, but 26 beta's 6.18 needs gcc-13+ (it passes
          # -fmin-function-alignment, which gcc-12 rejects). Prefer
          # include/config/cc-version-text (plain-text, one line); fall back to
          # include/generated/compile.h (LINUX_COMPILER macro). Handles both
          # "gcc-12 (Debian ...)" and "gcc (Debian 12.2.0-14) 12.2.0".
          HEADER_DIR="/tmp/kernel-headers/linux-headers-${KVER}"
          GCC_VER=""
          extract_gcc_ver() {
            local file="$1"
            local ver
            ver=$(grep -oP 'gcc-\K[0-9]+' "$file" 2>/dev/null | head -1)
            if [ -n "$ver" ]; then printf '%s' "$ver"; return; fi
            ver=$(grep -oP 'gcc\s+\(.*?\)\s+\K[0-9]+' "$file" 2>/dev/null | head -1)
            if [ -n "$ver" ]; then printf '%s' "$ver"; return; fi
          }
          if [ -f "${HEADER_DIR}/include/config/cc-version-text" ]; then
            GCC_VER=$(extract_gcc_ver "${HEADER_DIR}/include/config/cc-version-text")
          fi
          if [ -z "$GCC_VER" ] && [ -f "${HEADER_DIR}/include/generated/compile.h" ]; then
            GCC_VER=$(extract_gcc_ver "${HEADER_DIR}/include/generated/compile.h")
          fi
          if [ -z "$GCC_VER" ]; then
            echo "::warning title=gcc-version::could not detect GCC version from kernel headers, defaulting to gcc-12"
            GCC_VER="12"
          fi
          echo "Kernel GCC version: gcc-${GCC_VER}"
          echo "KERNEL_GCC=gcc-${GCC_VER}" >> "$GITHUB_ENV"

      # ── Build Hailo PCIe kernel module ──
      - name: Clone hailort-drivers
        run: |
          # The tag was already validated by check-releases.yml against
          # origin/hailo8 and capped at Frigate's pin. If it's gone now we
          # want a hard failure — falling back to `hailo8` HEAD would
          # silently ship a driver newer than Frigate, bypassing the gate
          # the rest of the pipeline enforces (HailoRT requires exact-match
          # between kernel module and userspace library).
          git clone --depth 1 --branch v${{ needs.resolve.outputs.hailo_driver_version }} \
            https://github.com/hailo-ai/hailort-drivers.git /tmp/hailort-drivers
          echo "Checked out hailort-drivers:"
          cd /tmp/hailort-drivers && git log --oneline -1

      - name: Apply driver patches
        run: |
          # Re-apply fixes the pinned driver tag lacks (see patches/*.patch).
          # We pin the driver to Frigate's bundled version (4.21.0), which
          # predates Hailo's own mmap_read_lock fix for find_vma — and the
          # hailo8 branch later reverted that fix anyway (present in 4.22,
          # gone again in 4.23). The applier is idempotent: it skips any
          # patch already present in the checked-out version and fails loud
          # if a patch no longer applies. Run from the repo checkout (the
          # default cwd) so it can reach the helper script and patches/.
          .github/scripts/apply-driver-patches.sh \
            /tmp/hailort-drivers \
            "${GITHUB_WORKSPACE}/patches"

      - name: Verify find_vma is locked
        run: |
          # Post-condition for the patch above, enforced regardless of which
          # driver version is being built. find_vma() on Linux 6.12+ asserts
          # the caller holds mmap_read_lock (mmap_assert_locked, rwsem.h:80);
          # without it hailo_vdma_buffer_map() WARNs on every DMA map ioctl
          # and can oops during inference. Refuse to ship a module where the
          # find_vma(current->mm,...) call is not immediately preceded by
          # mmap_read_lock(current->mm).
          MEMC=/tmp/hailort-drivers/linux/vdma/memory.c
          if ! awk '
            /vma = find_vma\(current->mm/ { if (prev !~ /mmap_read_lock\(current->mm\)/) bad=1 }
            { prev=$0 }
            END { exit bad }
          ' "$MEMC"; then
            echo "::error title=find_vma-lock::find_vma(current->mm,...) in ${MEMC} is not guarded by mmap_read_lock — refusing to ship a driver that triggers the rwsem.h:80 WARN/oops"
            grep -n -B2 -A1 'vma = find_vma(current->mm' "$MEMC" || true
            exit 1
          fi
          echo "OK: find_vma(current->mm,...) is guarded by mmap_read_lock"

      - name: Install kernel-matching GCC
        run: |
          if ! command -v "$KERNEL_GCC" &>/dev/null; then
            sudo apt-get install -y "$KERNEL_GCC"
          fi
          echo "Using compiler: $("$KERNEL_GCC" --version | head -1)"

      - name: Build hailo_pci kernel module
        run: |
          cd /tmp/hailort-drivers/linux/pcie
          KERNEL_DIR="/tmp/kernel-headers/linux-headers-${KVER}"

          echo "Building hailo_pci.ko against kernel ${KVER} with ${KERNEL_GCC}..."
          # Match the kernel's compiler (detected from the headers). A too-old GCC
          # rejects flags newer kernels pass (e.g. 6.18 -> -fmin-function-alignment).
          make CC="$KERNEL_GCC" KERNEL_DIR="$KERNEL_DIR" all

          echo "=== Module info ==="
          modinfo hailo_pci.ko
          ls -lh hailo_pci.ko

      # ── Build HailoRT userspace ──
      - name: Restore cached HailoRT build
        id: hailort-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/hailort/build
          # Runner is part of the key: libhailort.so links against the
          # runner's GLIBC. Reusing a cache built on a newer runner (e.g.
          # ubuntu-24.04) on an older one (ubuntu-22.04) would ship a
          # binary the TrueNAS rootfs can't load.
          key: hailort-build-v3-${{ needs.resolve.outputs.runner }}-${{ needs.resolve.outputs.hailo_driver_version }}

      - name: Clone hailort
        if: steps.hailort-cache.outputs.cache-hit != 'true'
        run: |
          # Same reasoning as the hailort-drivers clone above: the tag was
          # validated upstream; a missing tag at build time is a hard
          # failure, not a fallback to hailo8 HEAD.
          git clone --depth 1 --branch v${{ needs.resolve.outputs.hailo_driver_version }} \
            https://github.com/hailo-ai/hailort.git /tmp/hailort
          echo "Checked out hailort:"
          cd /tmp/hailort && git log --oneline -1

      - name: Build HailoRT library and CLI
        if: steps.hailort-cache.outputs.cache-hit != 'true'
        run: |
          cd /tmp/hailort
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr \
                ..
          make -j"$(nproc)"
          echo "=== Built artifacts ==="
          find . -name "libhailort*" -o -name "hailortcli" | head -20

      - name: Save HailoRT build to cache
        if: steps.hailort-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/hailort/build
          key: hailort-build-v3-${{ needs.resolve.outputs.runner }}-${{ needs.resolve.outputs.hailo_driver_version }}

      # ── Assemble sysext ──
      # NOTE: Firmware (hailo8_fw.bin) is NOT included in the sysext.
      # It is proprietary and downloaded directly from Hailo at install time.
      - name: Assemble sysext filesystem tree
        run: |
          SYSEXT_ROOT="/tmp/hailo-sysext"
          mkdir -p "${SYSEXT_ROOT}"

          # --- extension-release ---
          mkdir -p "${SYSEXT_ROOT}/usr/lib/extension-release.d"
          echo "ID=_any" > "${SYSEXT_ROOT}/usr/lib/extension-release.d/extension-release.hailo"

          # --- Kernel module ---
          # Use REAL_KVER (e.g. 6.12.33-production+truenas) not KVER (header dir name)
          MOD_DIR="${SYSEXT_ROOT}/usr/lib/modules/${REAL_KVER}/extra"
          mkdir -p "$MOD_DIR"
          cp /tmp/hailort-drivers/linux/pcie/hailo_pci.ko "$MOD_DIR/"

          # --- HailoRT shared library ---
          mkdir -p "${SYSEXT_ROOT}/usr/lib/x86_64-linux-gnu"
          # Find the actual ELF shared library (not a linker script)
          LIBHAILORT=""
          # shellcheck disable=SC2044 # for-in-find is fine: cmake build paths under /tmp/hailort/build have no spaces
          for candidate in $(find /tmp/hailort/build -name "libhailort.so*" -not -type l); do
            if file "$candidate" | grep -q "ELF"; then
              LIBHAILORT="$candidate"
              break
            fi
          done
          if [ -z "$LIBHAILORT" ]; then
            # No silent ship: a sysext without libhailort.so is a broken
            # release — every userspace caller (Frigate, hailortcli) fails
            # at runtime. Surface the build's actual output so the next
            # investigator can see what cmake produced.
            echo "::error title=libhailort::no ELF libhailort.so found under /tmp/hailort/build" >&2
            echo "Candidates considered:" >&2
            find /tmp/hailort/build -name "libhailort.so*" -exec file {} \; >&2 || true
            exit 1
          fi
          cp "$LIBHAILORT" "${SYSEXT_ROOT}/usr/lib/x86_64-linux-gnu/"
          LIBNAME=$(basename "$LIBHAILORT")
          # Create soname symlinks
          cd "${SYSEXT_ROOT}/usr/lib/x86_64-linux-gnu"
          if [[ "$LIBNAME" =~ ^(libhailort\.so\.[0-9]+) ]]; then
            SONAME="${BASH_REMATCH[1]}"
            [ "$SONAME" != "$LIBNAME" ] && ln -sf "$LIBNAME" "$SONAME"
            ln -sf "$LIBNAME" libhailort.so
          fi
          cd -

          # --- HailoRT CLI ---
          # CMake generates a shell wrapper script alongside the real binary.
          # We must find the actual ELF binary, not the wrapper.
          mkdir -p "${SYSEXT_ROOT}/usr/bin"
          HAILORT_CLI=""
          # shellcheck disable=SC2044
          for candidate in $(find /tmp/hailort/build -name "hailortcli" -type f); do
            if file "$candidate" | grep -q "ELF"; then
              HAILORT_CLI="$candidate"
              break
            fi
          done
          if [ -z "$HAILORT_CLI" ]; then
            # The release notes advertise hailortcli; missing it = silent
            # regression. Match the libhailort failure mode rather than
            # warn-and-continue.
            echo "::error title=hailortcli::no ELF hailortcli binary found under /tmp/hailort/build" >&2
            echo "Candidates considered:" >&2
            find /tmp/hailort/build -name "hailortcli" -type f -exec file {} \; >&2 || true
            exit 1
          fi
          echo "Found hailortcli ELF binary: $HAILORT_CLI"
          cp "$HAILORT_CLI" "${SYSEXT_ROOT}/usr/bin/hailortcli"
          chmod +x "${SYSEXT_ROOT}/usr/bin/hailortcli"

          # --- systemd service ---
          mkdir -p "${SYSEXT_ROOT}/usr/lib/systemd/system/multi-user.target.wants"
          cp sysext/usr/lib/systemd/system/hailo-load.service "${SYSEXT_ROOT}/usr/lib/systemd/system/"
          ln -sf ../hailo-load.service "${SYSEXT_ROOT}/usr/lib/systemd/system/multi-user.target.wants/hailo-load.service"

          # --- udev rules ---
          mkdir -p "${SYSEXT_ROOT}/usr/lib/udev/rules.d"
          cp sysext/usr/lib/udev/rules.d/51-hailo-udev.rules "${SYSEXT_ROOT}/usr/lib/udev/rules.d/"

          # --- preinit script (bundled for install.sh to extract) ---
          # The PREINIT script lives in PERSIST_DIR after install — but install.sh
          # needs a source to copy from. Bundling it inside the sysext makes the
          # release artifact self-contained: whatever hailo.raw the user installs
          # ships with the matching preinit script, no separate fetch needed.
          mkdir -p "${SYSEXT_ROOT}/usr/lib/hailo"
          cp scripts/hailo-preinit.sh "${SYSEXT_ROOT}/usr/lib/hailo/hailo-preinit.sh"
          chmod +x "${SYSEXT_ROOT}/usr/lib/hailo/hailo-preinit.sh"

          # NOTE: We do NOT run depmod here. Including modules.dep in the sysext
          # would replace the base system's module database via overlayfs, breaking
          # all other modules. Instead, the hailo-load.service uses insmod directly.

          echo "=== Sysext tree ==="
          find "${SYSEXT_ROOT}" -type f -o -type l | sort

      - name: Create hailo.raw squashfs
        run: |
          # -all-root: the runner builds the tree as a non-root user, but
          # the sysext is exec'd as root on the target — own files as root
          # rather than carrying the runner's uid/gid into the squashfs.
          mksquashfs /tmp/hailo-sysext hailo.raw -noappend -comp zstd -all-root
          echo "=== hailo.raw ==="
          ls -lh hailo.raw
          echo ""
          echo "=== Contents ==="
          unsquashfs -l hailo.raw | head -40

      - name: Smoke-test hailo.raw contents
        run: |
          # Open the produced squashfs and verify that the assembly step
          # actually placed every component the release advertises. The
          # earlier ELF-on-input check (libhailort/hailortcli during
          # assembly) confirms the source binaries; this confirms they
          # made it into the final artifact at the right paths. Catches
          # silent mksquashfs flag drift, kernel-path drift, missing
          # preinit bundling, etc.
          set -e
          SMOKE_TMP="$(mktemp -d)"
          trap 'rm -rf "$SMOKE_TMP"' EXIT

          unsquashfs -d "${SMOKE_TMP}/extract" hailo.raw

          fail=0
          require_file() {
            local rel="$1"
            local path="${SMOKE_TMP}/extract/${rel}"
            if [ ! -e "$path" ]; then
              echo "::error title=smoke-test::missing in hailo.raw: ${rel}"
              fail=1
              return
            fi
            echo "  ok: ${rel}"
          }
          require_elf() {
            local rel="$1"
            local path="${SMOKE_TMP}/extract/${rel}"
            if [ ! -f "$path" ]; then
              echo "::error title=smoke-test::missing in hailo.raw: ${rel}"
              fail=1
              return
            fi
            if ! file "$path" | grep -q 'ELF'; then
              echo "::error title=smoke-test::not an ELF binary: ${rel}"
              file "$path"
              fail=1
              return
            fi
            echo "  ok (ELF): ${rel}"
          }

          echo "=== smoke-test: required paths ==="
          require_file "usr/lib/extension-release.d/extension-release.hailo"
          require_file "usr/lib/modules/${REAL_KVER}/extra/hailo_pci.ko"
          require_elf  "usr/bin/hailortcli"
          require_file "usr/lib/hailo/hailo-preinit.sh"

          # libhailort.so.* — match the concrete ELF (not the unversioned symlink)
          LIBHAILORT_REL=$(cd "${SMOKE_TMP}/extract" && \
            find usr/lib/x86_64-linux-gnu -maxdepth 1 -name 'libhailort.so.*' -not -type l \
            2>/dev/null | head -1) || true
          if [ -z "$LIBHAILORT_REL" ]; then
            echo "::error title=smoke-test::no concrete libhailort.so.* found in hailo.raw"
            fail=1
          else
            require_elf "$LIBHAILORT_REL"
          fi

          # vermagic sanity: the kernel module's vermagic must reference REAL_KVER.
          # If we shipped a module built for the wrong kernel, modprobe-style
          # version checks would refuse to load it. Catch it before publish.
          KO_PATH="${SMOKE_TMP}/extract/usr/lib/modules/${REAL_KVER}/extra/hailo_pci.ko"
          if [ -f "$KO_PATH" ]; then
            VERMAGIC=$(modinfo -F vermagic "$KO_PATH" 2>/dev/null || true)
            if [ -z "$VERMAGIC" ]; then
              echo "::error title=smoke-test::could not read vermagic from hailo_pci.ko"
              fail=1
            elif ! printf '%s' "$VERMAGIC" | grep -qF "$REAL_KVER"; then
              echo "::error title=smoke-test::hailo_pci.ko vermagic does not reference REAL_KVER (${REAL_KVER}); got: ${VERMAGIC}"
              fail=1
            else
              echo "  ok: hailo_pci.ko vermagic references ${REAL_KVER}"
            fi
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error title=smoke-test::hailo.raw is missing required components — refusing to publish"
            exit 1
          fi
          echo "smoke-test OK"

      - name: Generate checksums
        run: |
          sha256sum hailo.raw > hailo.raw.sha256
          cat hailo.raw.sha256

      - name: Compute firmware sha256
        # Each release self-describes the firmware sha it was built against.
        # install.sh fetches this asset from the same release as hailo.raw,
        # eliminating the cross-source mismatch tracked-versions.json caused
        # (see #22, #24). File format: single line, 64 hex chars, no filename.
        env:
          HAILO_DRIVER: ${{ needs.resolve.outputs.hailo_driver_version }}
        run: |
          set -euo pipefail
          FW_URL="https://hailo-hailort.s3.eu-west-2.amazonaws.com/Hailo8/${HAILO_DRIVER}/FW/hailo8_fw.${HAILO_DRIVER}.bin"
          echo "Fetching firmware: ${FW_URL}"
          if ! curl -fsSL --max-time 300 "$FW_URL" -o /tmp/hailo8_fw.bin; then
            echo "::error title=firmware-fetch::failed to download ${FW_URL} — refusing to publish without a firmware.sha256"
            exit 1
          fi
          if [ ! -s /tmp/hailo8_fw.bin ]; then
            echo "::error title=firmware-fetch::downloaded firmware is empty (${FW_URL})"
            exit 1
          fi
          FW_SHA=$(sha256sum /tmp/hailo8_fw.bin | awk '{print $1}')
          if ! printf '%s' "$FW_SHA" | grep -qE '^[0-9a-f]{64}$'; then
            echo "::error title=firmware-fetch::sha256sum returned malformed value: ${FW_SHA}"
            exit 1
          fi
          printf '%s\n' "$FW_SHA" > firmware.sha256
          echo "firmware.sha256: ${FW_SHA}"
          rm -f /tmp/hailo8_fw.bin

      - name: Render release notes
        env:
          TRUENAS_VERSION: ${{ needs.resolve.outputs.truenas_version }}
          TRAIN_NAME: ${{ needs.resolve.outputs.train_name }}
          HAILO_DRIVER: ${{ needs.resolve.outputs.hailo_driver_version }}
          RUNNER_IMAGE: ${{ needs.resolve.outputs.runner }}
          BUILD_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ steps.build_id.outputs.run_number }}
          REPO: ${{ github.repository }}
        run: |
          # The body is regenerated on every dispatch — no template file checked
          # in. REAL_KVER comes from the kernel-detection step (exported via
          # GITHUB_ENV); the rest are workflow inputs / runtime metadata. The
          # body links to the Frigate install_hailort.sh on the dev branch (the
          # canonical consumer per CLAUDE.md) so the human gating "Set as latest"
          # can confirm the build matches what Frigate is actually shipping.
          cat > release-notes.md <<EOF
          ## Hailo-8 Sysext for TrueNAS SCALE ${TRUENAS_VERSION} (${TRAIN_NAME})

          | Field | Value |
          | --- | --- |
          | HailoRT driver | \`${HAILO_DRIVER}\` |
          | Target kernel | \`${REAL_KVER}\` |
          | Built on | \`${RUNNER_IMAGE}\` |
          | Source commit | [\`${BUILD_SHA}\`](https://github.com/${REPO}/commit/${BUILD_SHA}) |
          | Frigate compatibility | [install_hailort.sh (dev branch)](https://github.com/blakeblackshear/frigate/blob/dev/docker/main/install_hailort.sh) — pinned HailoRT: \`${HAILO_DRIVER}\` |

          **Target Device:** Hailo-8 AI Accelerator (PCIe). For Hailo-10/15, see [README](https://github.com/${REPO}#compatibility).

          ### Included Components
          - \`hailo_pci.ko\` — PCIe kernel module (built against kernel \`${REAL_KVER}\`)
          - \`libhailort.so\` — HailoRT runtime library
          - \`hailortcli\` — HailoRT command-line tool
          - \`hailo-load.service\` — Systemd unit that loads the module on boot
          - \`hailo-preinit.sh\` — TrueNAS PREINIT script bundled inside the sysext
          - \`51-hailo-udev.rules\` — Udev rules for \`/dev/hailo*\` permissions

          > **Note:** Hailo-8 firmware (\`hailo8_fw.bin\`) is proprietary and downloaded
          > directly from Hailo's servers during installation. Not included in this release.

          ### Install
          \`\`\`bash
          curl -fsSL https://github.com/${REPO}/releases/download/v${TRUENAS_VERSION}-hailo${HAILO_DRIVER}-r${RUN_NUMBER}/install.sh | sudo bash
          \`\`\`

          ### Verify
          \`\`\`bash
          sudo ./install.sh --check
          sudo hailortcli fw-control identify
          \`\`\`

          ### Uninstall
          \`\`\`bash
          curl -fsSL https://github.com/${REPO}/releases/download/v${TRUENAS_VERSION}-hailo${HAILO_DRIVER}-r${RUN_NUMBER}/uninstall.sh | sudo bash
          \`\`\`

          ### Checksums
          See \`hailo.raw.sha256\`.
          EOF

          echo "=== Rendered release notes ==="
          cat release-notes.md

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: hailo-sysext-${{ needs.resolve.outputs.truenas_version }}-hailort-${{ needs.resolve.outputs.hailo_driver_version }}
          path: |
            hailo.raw
            hailo.raw.sha256
            firmware.sha256
            release-notes.md

  release:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: scripts
          sparse-checkout-cone-mode: true

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: hailo-sysext-${{ needs.resolve.outputs.truenas_version }}-hailort-${{ needs.resolve.outputs.hailo_driver_version }}

      - name: Create GitHub release
        id: release
        uses: softprops/action-gh-release@v3
        with:
          # -r<run> suffix: every invocation gets a unique tag so nothing
          # collides with GitHub's immutable-release tag-burn (issue #17).
          # github.run_number is monotonic per workflow, so it also covers
          # the same-commit re-dispatch case (manual retry, fresh build
          # after a deleted release) where a SHA alone wouldn't change.
          tag_name: v${{ needs.resolve.outputs.truenas_version }}-hailo${{ needs.resolve.outputs.hailo_driver_version }}-r${{ needs.build.outputs.run_number }}
          name: "TrueNAS ${{ needs.resolve.outputs.truenas_version }} - Hailo ${{ needs.resolve.outputs.hailo_driver_version }} (r${{ needs.build.outputs.run_number }})"
          body_path: release-notes.md
          files: |
            hailo.raw
            hailo.raw.sha256
            firmware.sha256
            scripts/install.sh
            scripts/restore.sh
            scripts/uninstall.sh
          # Draft first so assets attach even on immutable-release repos.
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish the draft (prerelease gate, or Latest on override)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REL_ID: ${{ steps.release.outputs.id }}
          MARK_LATEST: ${{ needs.resolve.outputs.mark_latest }}
        run: |
          if [ "$MARK_LATEST" = "true" ]; then
            gh api --method PATCH "repos/${REPO}/releases/${REL_ID}" -F draft=false -f make_latest=true
          else
            gh api --method PATCH "repos/${REPO}/releases/${REL_ID}" -F draft=false -F prerelease=true
          fi

      - name: Create hardware-test issue for auto-build
        if: needs.resolve.outputs.mark_latest == 'false'
        uses: actions/github-script@v9
        env:
          TRUENAS_VERSION: ${{ needs.resolve.outputs.truenas_version }}
          HAILO_DRIVER: ${{ needs.resolve.outputs.hailo_driver_version }}
          RUN_NUMBER: ${{ needs.build.outputs.run_number }}
        with:
          script: |
            const tag = `v${process.env.TRUENAS_VERSION}-hailo${process.env.HAILO_DRIVER}-r${process.env.RUN_NUMBER}`;
            const title = `Hardware test: TrueNAS ${process.env.TRUENAS_VERSION} / HailoRT ${process.env.HAILO_DRIVER} (${tag})`;
            const releaseUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`;

            // Ensure the label exists (idempotent — no-ops if already present).
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'hardware-test',
                color: 'FBCA04',
                description: 'Auto-build awaiting hardware verification',
              });
              console.log('Created hardware-test label');
            } catch (e) {
              if (e.status === 422) {
                console.log('hardware-test label already exists');
              } else {
                throw e;
              }
            }

            // Skip if an open issue already exists for this release tag.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'hardware-test',
              per_page: 100,
            });
            if (existing.data.some(i => i.title.includes(tag))) {
              console.log(`Open hardware-test issue already exists for ${tag} — skipping`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['hardware-test'],
              body: [
                `An auto-build published a new release that needs hardware verification before being promoted to **Latest**.`,
                ``,
                `**Release:** [${tag}](${releaseUrl})`,
                `<!-- release-tag: ${tag} -->`,
                `**TrueNAS:** ${process.env.TRUENAS_VERSION}`,
                `**HailoRT:** ${process.env.HAILO_DRIVER}`,
                ``,
                `### Install THIS build to test it`,
                `It is a **pre-release**, so the default \`latest\` install (and version auto-resolve) skip it. Install this exact build:`,
                // Pre-releases have no firmware.sha256 fetched by auto-resolve,
                // so install.sh runs in --local-raw mode and requires the firmware
                // version + expected sha explicitly (see install.sh local-raw guard).
                // Supply both: the version is the HailoRT driver, the sha comes from
                // this release's firmware.sha256 asset.
                "```bash",
                `BASE=https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}`,
                `curl -fsSL "$BASE/hailo.raw" -o /tmp/hailo.raw`,
                `curl -fsSL "$BASE/install.sh" | sudo bash -s -- /tmp/hailo.raw \\`,
                `  --firmware-version=${process.env.HAILO_DRIVER} \\`,
                `  --expected-firmware-sha="$(curl -fsSL "$BASE/firmware.sha256")"`,
                "```",
                ``,
                `### Test checklist`,
                `- [ ] Download and install on a TrueNAS system with a Hailo-8 card`,
                `- [ ] Confirm \`hailortcli fw-control identify\` succeeds`,
                `- [ ] Confirm Frigate detects the Hailo device`,
                `- [ ] Reboot and confirm the PREINIT script restores the sysext`,
                ``,
                `### Promote`,
                `This build is published as a **pre-release**, so it is not served by \`releases/latest\` (or install.sh) yet.`,
                `Once you've verified it on hardware, **close this issue as completed** — that automatically promotes [\`${tag}\`](${releaseUrl}) to the latest release and appends the changelog.`,
              ].join('\n'),
            });
            console.log(`Created hardware-test issue for ${tag}`);
