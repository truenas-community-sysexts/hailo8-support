name: Build Hailo Sysext

on:
  workflow_dispatch:
    inputs:
      truenas_version:
        description: 'TrueNAS version (e.g., 25.10.2.1)'
        required: true
        default: '25.10.2.1'
      hailo_driver_version:
        description: 'HailoRT driver version (e.g., 4.20.0)'
        required: true
        default: '4.20.0'
      train_name:
        description: 'Train name (e.g., Goldeye)'
        required: true
        default: 'Goldeye'

  workflow_call:
    inputs:
      truenas_version:
        type: string
        required: true
      hailo_driver_version:
        type: string
        required: true
      train_name:
        type: string
        required: true

permissions:
  contents: write

jobs:
  build:
    # Use ubuntu-22.04 (GLIBC 2.35) so binaries are compatible with
    # TrueNAS SCALE (Debian Bookworm, GLIBC 2.36). Ubuntu 24.04 has
    # GLIBC 2.39 which is too new.
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-12 \
            cmake \
            libelf-dev \
            squashfs-tools \
            zstd \
            kmod \
            curl

      # ── Obtain TrueNAS kernel headers from the release ISO ──
      - name: Restore cached TrueNAS ISO
        id: iso-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/truenas.iso
          key: truenas-iso-${{ inputs.truenas_version }}

      - name: Download TrueNAS ISO
        if: steps.iso-cache.outputs.cache-hit != 'true'
        run: |
          TRAIN="TrueNAS-SCALE-${{ inputs.train_name }}"
          VERSION="${{ inputs.truenas_version }}"
          ISO_URL="https://download.truenas.com/${TRAIN}/${VERSION}/TrueNAS-SCALE-${VERSION}.iso"
          echo "Downloading: ${ISO_URL}"
          curl -fSL "$ISO_URL" -o /tmp/truenas.iso
          ls -lh /tmp/truenas.iso

      - name: Save TrueNAS ISO to cache
        if: steps.iso-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/truenas.iso
          key: truenas-iso-${{ inputs.truenas_version }}

      - name: Restore cached kernel headers
        id: headers-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/kernel-headers
          key: kernel-headers-v3-${{ inputs.truenas_version }}

      - name: Extract kernel headers from TrueNAS ISO
        if: steps.headers-cache.outputs.cache-hit != 'true'
        run: |
          # TrueNAS ISO structure:
          #   /live/filesystem.squashfs  — installer-only environment (NO kernel headers)
          #   /TrueNAS-SCALE.update      — outer squashfs containing:
          #     /rootfs.squashfs           — full rootfs with headers at /usr/src/linux-headers-*
          #
          # We must extract the nested rootfs.squashfs from inside the .update file.

          sudo mkdir -p /tmp/iso
          sudo mount -o loop /tmp/truenas.iso /tmp/iso

          echo "=== ISO contents ==="
          ls -la /tmp/iso/

          # --- Extract the real rootfs from TrueNAS-SCALE.update (nested squashfs) ---
          UPDATE_FILE="/tmp/iso/TrueNAS-SCALE.update"
          if [ -f "$UPDATE_FILE" ]; then
            echo "Found TrueNAS-SCALE.update ($(du -h "$UPDATE_FILE" | cut -f1)), extracting rootfs.squashfs..."
            sudo rm -rf /tmp/update-contents
            sudo unsquashfs -d /tmp/update-contents "$UPDATE_FILE" rootfs.squashfs || {
              echo "ERROR: Failed to extract rootfs.squashfs from .update file"
              sudo umount /tmp/iso
              exit 1
            }

            ROOTFS_SQUASHFS="/tmp/update-contents/rootfs.squashfs"
            if [ ! -f "$ROOTFS_SQUASHFS" ]; then
              echo "ERROR: rootfs.squashfs not found inside .update file"
              echo "=== .update contents ==="
              ls -la /tmp/update-contents/
              sudo umount /tmp/iso
              exit 1
            fi

            echo "Extracting kernel headers from rootfs.squashfs..."
            sudo rm -rf /tmp/rootfs
            # Extract only /usr/src and /lib/modules to save time and disk
            sudo unsquashfs -d /tmp/rootfs "$ROOTFS_SQUASHFS" 'usr/src/linux-headers-*' 'lib/modules/*' || {
              echo "WARNING: Selective extract failed, trying full extract..."
              sudo rm -rf /tmp/rootfs
              sudo unsquashfs -d /tmp/rootfs "$ROOTFS_SQUASHFS"
            }
          else
            echo "No TrueNAS-SCALE.update found, falling back to live/filesystem.squashfs..."

            # Fallback for older ISO layouts
            SQUASHFS=""
            for candidate in \
              /tmp/iso/live/filesystem.squashfs \
              /tmp/iso/rootfs.squashfs \
              /tmp/iso/truenas.squashfs; do
              if [ -f "$candidate" ]; then
                SQUASHFS="$candidate"
                break
              fi
            done

            if [ -z "$SQUASHFS" ]; then
              echo "ERROR: Could not find any squashfs in ISO"
              find /tmp/iso -name "*.squashfs" -o -name "*.update" 2>/dev/null || true
              sudo umount /tmp/iso
              exit 1
            fi

            echo "Found squashfs: $SQUASHFS"
            sudo mkdir -p /tmp/rootfs
            sudo mount -o loop "$SQUASHFS" /tmp/rootfs
          fi

          # --- Find kernel headers ---
          echo "=== /usr/src contents ==="
          ls -la /tmp/rootfs/usr/src/ 2>/dev/null || echo "(empty or missing)"

          # Select kernel headers: prefer production over debug
          # TrueNAS provides headers like:
          #   linux-headers-truenas-production-amd64  (non-versioned, preferred)
          #   linux-headers-truenas-debug-amd64       (non-versioned, avoid)
          #   linux-headers-6.6.x-production+truenas  (versioned, preferred)
          #   linux-headers-6.6.x-debug+truenas       (versioned, avoid)
          KVER=$(ls /tmp/rootfs/usr/src/ 2>/dev/null | grep 'linux-headers-' | sed 's/linux-headers-//' | grep -i 'production' | head -1)
          if [ -z "$KVER" ]; then
            # Fall back to any non-debug headers
            KVER=$(ls /tmp/rootfs/usr/src/ 2>/dev/null | grep 'linux-headers-' | sed 's/linux-headers-//' | grep -vi 'debug' | head -1)
          fi
          if [ -z "$KVER" ]; then
            # Last resort: any headers at all (even debug)
            KVER=$(ls /tmp/rootfs/usr/src/ 2>/dev/null | grep 'linux-headers-' | head -1 | sed 's/linux-headers-//')
          fi

          if [ -z "$KVER" ]; then
            echo "ERROR: No kernel headers found in rootfs"
            echo "=== Debug: /lib/modules contents ==="
            ls -la /tmp/rootfs/lib/modules/ 2>/dev/null || true
            sudo umount /tmp/iso 2>/dev/null || true
            exit 1
          fi

          echo "Header package version: ${KVER}"

          # Detect the REAL kernel version (what uname -r returns on the target).
          # The header directory name (e.g. truenas-production-amd64) may differ
          # from the actual kernel release string (e.g. 6.12.33-production+truenas).
          REAL_KVER=""
          # Method 1: kernel.release in headers
          if [ -f "/tmp/rootfs/usr/src/linux-headers-${KVER}/include/config/kernel.release" ]; then
            REAL_KVER=$(cat "/tmp/rootfs/usr/src/linux-headers-${KVER}/include/config/kernel.release" | tr -d '[:space:]')
          fi
          # Method 2: /lib/modules directory name
          if [ -z "$REAL_KVER" ]; then
            REAL_KVER=$(ls /tmp/rootfs/lib/modules/ 2>/dev/null | grep -v '^\.' | head -1)
          fi
          # Method 3: fall back to header dir name
          if [ -z "$REAL_KVER" ]; then
            REAL_KVER="$KVER"
          fi
          echo "Real kernel version: ${REAL_KVER}"

          # Copy kernel headers to build directory
          sudo mkdir -p /tmp/kernel-headers
          sudo cp -a "/tmp/rootfs/usr/src/linux-headers-${KVER}" /tmp/kernel-headers/

          # Save real kernel version for later steps
          echo "$REAL_KVER" | sudo tee /tmp/kernel-headers/.real-kver

          # Cleanup
          sudo umount /tmp/rootfs 2>/dev/null || true
          sudo umount /tmp/iso 2>/dev/null || true

          echo "Kernel headers extracted successfully"
          ls -la /tmp/kernel-headers/

      - name: Save kernel headers to cache
        if: steps.headers-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/kernel-headers
          key: kernel-headers-v3-${{ inputs.truenas_version }}

      - name: Detect kernel version from cached headers
        run: |
          KVER=$(ls /tmp/kernel-headers/ | grep 'linux-headers-' | sed 's/linux-headers-//' | grep -i 'production' | head -1)
          if [ -z "$KVER" ]; then
            KVER=$(ls /tmp/kernel-headers/ | grep 'linux-headers-' | sed 's/linux-headers-//' | grep -vi 'debug' | head -1)
          fi
          if [ -z "$KVER" ]; then
            KVER=$(ls /tmp/kernel-headers/ | grep 'linux-headers-' | head -1 | sed 's/linux-headers-//')
          fi
          if [ -z "$KVER" ]; then
            echo "ERROR: No kernel headers found in cache"
            ls -la /tmp/kernel-headers/
            exit 1
          fi
          echo "Header package version: ${KVER}"
          echo "KVER=${KVER}" >> "$GITHUB_ENV"

          # Read real kernel version (what uname -r returns on the target)
          REAL_KVER=""
          if [ -f "/tmp/kernel-headers/.real-kver" ]; then
            REAL_KVER=$(cat /tmp/kernel-headers/.real-kver | tr -d '[:space:]')
          fi
          if [ -z "$REAL_KVER" ]; then
            REAL_KVER="$KVER"
          fi
          echo "Real kernel version: ${REAL_KVER}"
          echo "REAL_KVER=${REAL_KVER}" >> "$GITHUB_ENV"

      # ── Build Hailo PCIe kernel module ──
      - name: Clone hailort-drivers
        run: |
          git clone --depth 1 --branch v${{ inputs.hailo_driver_version }} \
            https://github.com/hailo-ai/hailort-drivers.git /tmp/hailort-drivers || {
            echo "WARNING: Failed to clone tag v${{ inputs.hailo_driver_version }}, trying hailo8 branch"
            git clone --depth 1 --branch hailo8 \
              https://github.com/hailo-ai/hailort-drivers.git /tmp/hailort-drivers || {
              echo "ERROR: Failed to clone hailort-drivers from any branch"
              exit 1
            }
          }
          echo "Checked out hailort-drivers:"
          cd /tmp/hailort-drivers && git log --oneline -1

      - name: Build hailo_pci kernel module
        run: |
          cd /tmp/hailort-drivers/linux/pcie
          KERNEL_DIR="/tmp/kernel-headers/linux-headers-${KVER}"

          echo "Building hailo_pci.ko against kernel ${KVER}..."
          # Use GCC 12 to match the kernel's compiler (GCC 11 lacks -ftrivial-auto-var-init=zero)
          make CC=gcc-12 KERNEL_DIR="$KERNEL_DIR" all

          echo "=== Module info ==="
          modinfo hailo_pci.ko
          ls -lh hailo_pci.ko

      # ── Build HailoRT userspace ──
      - name: Restore cached HailoRT build
        id: hailort-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/hailort/build
          key: hailort-build-v2-${{ inputs.hailo_driver_version }}

      - name: Clone hailort
        if: steps.hailort-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v${{ inputs.hailo_driver_version }} \
            https://github.com/hailo-ai/hailort.git /tmp/hailort || {
            echo "WARNING: Failed to clone tag v${{ inputs.hailo_driver_version }}, trying hailo8 branch"
            git clone --depth 1 --branch hailo8 \
              https://github.com/hailo-ai/hailort.git /tmp/hailort || {
              echo "ERROR: Failed to clone hailort from any branch"
              exit 1
            }
          }
          echo "Checked out hailort:"
          cd /tmp/hailort && git log --oneline -1

      - name: Build HailoRT library and CLI
        if: steps.hailort-cache.outputs.cache-hit != 'true'
        run: |
          cd /tmp/hailort
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr \
                ..
          make -j$(nproc)
          echo "=== Built artifacts ==="
          find . -name "libhailort*" -o -name "hailortcli" | head -20

      - name: Save HailoRT build to cache
        if: steps.hailort-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/hailort/build
          key: hailort-build-v2-${{ inputs.hailo_driver_version }}

      # ── Assemble sysext ──
      # NOTE: Firmware (hailo8_fw.bin) is NOT included in the sysext.
      # It is proprietary and downloaded directly from Hailo at install time.
      - name: Assemble sysext filesystem tree
        run: |
          SYSEXT_ROOT="/tmp/hailo-sysext"
          mkdir -p "${SYSEXT_ROOT}"

          # --- extension-release ---
          mkdir -p "${SYSEXT_ROOT}/usr/lib/extension-release.d"
          echo "ID=_any" > "${SYSEXT_ROOT}/usr/lib/extension-release.d/extension-release.hailo"

          # --- Kernel module ---
          # Use REAL_KVER (e.g. 6.12.33-production+truenas) not KVER (header dir name)
          MOD_DIR="${SYSEXT_ROOT}/usr/lib/modules/${REAL_KVER}/extra"
          mkdir -p "$MOD_DIR"
          cp /tmp/hailort-drivers/linux/pcie/hailo_pci.ko "$MOD_DIR/"

          # --- HailoRT shared library ---
          mkdir -p "${SYSEXT_ROOT}/usr/lib/x86_64-linux-gnu"
          # Find the actual ELF shared library (not a linker script)
          LIBHAILORT=""
          for candidate in $(find /tmp/hailort/build -name "libhailort.so*" -not -type l); do
            if file "$candidate" | grep -q "ELF"; then
              LIBHAILORT="$candidate"
              break
            fi
          done
          if [ -n "$LIBHAILORT" ]; then
            cp "$LIBHAILORT" "${SYSEXT_ROOT}/usr/lib/x86_64-linux-gnu/"
            LIBNAME=$(basename "$LIBHAILORT")
            # Create soname symlinks
            cd "${SYSEXT_ROOT}/usr/lib/x86_64-linux-gnu"
            if [[ "$LIBNAME" =~ libhailort\.so\..* ]]; then
              SONAME=$(echo "$LIBNAME" | sed 's/\(libhailort\.so\.[0-9]*\).*/\1/')
              [ "$SONAME" != "$LIBNAME" ] && ln -sf "$LIBNAME" "$SONAME"
              ln -sf "$LIBNAME" libhailort.so
            fi
            cd -
          fi

          # --- HailoRT CLI ---
          # CMake generates a shell wrapper script alongside the real binary.
          # We must find the actual ELF binary, not the wrapper.
          mkdir -p "${SYSEXT_ROOT}/usr/bin"
          HAILORT_CLI=""
          for candidate in $(find /tmp/hailort/build -name "hailortcli" -type f); do
            if file "$candidate" | grep -q "ELF"; then
              HAILORT_CLI="$candidate"
              break
            fi
          done
          if [ -n "$HAILORT_CLI" ]; then
            echo "Found hailortcli ELF binary: $HAILORT_CLI"
            cp "$HAILORT_CLI" "${SYSEXT_ROOT}/usr/bin/hailortcli"
            chmod +x "${SYSEXT_ROOT}/usr/bin/hailortcli"
          else
            echo "WARNING: No ELF hailortcli binary found, listing candidates:"
            find /tmp/hailort/build -name "hailortcli" -type f -exec file {} \;
          fi

          # --- systemd service ---
          mkdir -p "${SYSEXT_ROOT}/usr/lib/systemd/system/multi-user.target.wants"
          cp sysext/usr/lib/systemd/system/hailo-load.service "${SYSEXT_ROOT}/usr/lib/systemd/system/"
          ln -sf ../hailo-load.service "${SYSEXT_ROOT}/usr/lib/systemd/system/multi-user.target.wants/hailo-load.service"

          # --- udev rules ---
          mkdir -p "${SYSEXT_ROOT}/usr/lib/udev/rules.d"
          cp sysext/usr/lib/udev/rules.d/51-hailo-udev.rules "${SYSEXT_ROOT}/usr/lib/udev/rules.d/"

          # --- preinit script (bundled for install.sh to extract) ---
          # The PREINIT script lives in PERSIST_DIR after install — but install.sh
          # needs a source to copy from. Bundling it inside the sysext makes the
          # release artifact self-contained: whatever hailo.raw the user installs
          # ships with the matching preinit script, no separate fetch needed.
          mkdir -p "${SYSEXT_ROOT}/usr/lib/hailo"
          cp scripts/hailo-preinit.sh "${SYSEXT_ROOT}/usr/lib/hailo/hailo-preinit.sh"
          chmod +x "${SYSEXT_ROOT}/usr/lib/hailo/hailo-preinit.sh"

          # NOTE: We do NOT run depmod here. Including modules.dep in the sysext
          # would replace the base system's module database via overlayfs, breaking
          # all other modules. Instead, the hailo-load.service uses insmod directly.

          echo "=== Sysext tree ==="
          find "${SYSEXT_ROOT}" -type f -o -type l | sort

      - name: Create hailo.raw squashfs
        run: |
          mksquashfs /tmp/hailo-sysext hailo.raw -noappend -comp zstd -all-root
          echo "=== hailo.raw ==="
          ls -lh hailo.raw
          echo ""
          echo "=== Contents ==="
          unsquashfs -l hailo.raw | head -40

      - name: Generate checksums
        run: |
          sha256sum hailo.raw > hailo.raw.sha256
          cat hailo.raw.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hailo-sysext-${{ inputs.truenas_version }}-hailort-${{ inputs.hailo_driver_version }}
          path: |
            hailo.raw
            hailo.raw.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.truenas_version }}-hailo${{ inputs.hailo_driver_version }}
          name: "TrueNAS ${{ inputs.truenas_version }} - Hailo ${{ inputs.hailo_driver_version }}"
          body: |
            ## Hailo-8 Sysext for TrueNAS SCALE ${{ inputs.truenas_version }} (${{ inputs.train_name }})

            **HailoRT Driver:** ${{ inputs.hailo_driver_version }}
            **Target Device:** Hailo-8 AI Accelerator (PCIe)

            ### Included Components
            - `hailo_pci.ko` — PCIe kernel module (compiled for this TrueNAS kernel)
            - `libhailort.so` — HailoRT runtime library
            - `hailortcli` — HailoRT command-line tool
            - `hailo-load.service` — Systemd service for automatic module loading
            - `51-hailo-udev.rules` — Udev rules for device permissions

            > **Note:** Hailo-8 firmware (`hailo8_fw.bin`) is proprietary and downloaded
            > directly from Hailo's servers during installation. It is not included in this release.

            ### Install
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/v${{ inputs.truenas_version }}-hailo${{ inputs.hailo_driver_version }}/install.sh | sudo bash
            ```

            ### Verify
            ```bash
            hailortcli fw-control identify
            ls -la /dev/hailo*
            ```

            ### Checksums
            See `hailo.raw.sha256` for verification.
          files: |
            hailo.raw
            hailo.raw.sha256
            scripts/install.sh
            scripts/restore.sh
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
